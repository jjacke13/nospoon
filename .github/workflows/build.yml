name: Build

on:
  push:
    branches: [nospoon-bare]
  pull_request:
    branches: [nospoon-bare]

jobs:
  # Build native addon (.node + .bare) on each platform
  addon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-14
            target: darwin-x64
            arch: x86_64
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    runs-on: ${{ matrix.os }}
    name: addon (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4
        with:
          ref: nospoon-bare

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        working-directory: native
        shell: bash
        run: |
          CMAKE_ARGS="-DCMAKE_PREFIX_PATH=$(cd ../node_modules && pwd)"
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_ARCHITECTURES=x86_64"
          fi
          cmake -B build $CMAKE_ARGS
          cmake --build build --config Release

      - name: Collect prebuilds
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.target }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp native/build/Release/nospoon-tun.node prebuilds/${{ matrix.target }}/ || \
            cp native/build/nospoon-tun.node prebuilds/${{ matrix.target }}/
          else
            cp native/build/nospoon-tun.node prebuilds/${{ matrix.target }}/
          fi
          # .bare file has versioned name from cmake-bare
          find native/build -name "*.bare" -exec cp {} prebuilds/${{ matrix.target }}/nospoon-tun.bare \;

      - name: Verify addon loads
        if: matrix.arch == ''
        run: node -e "const b = require('./lib/binding'); console.log('OK:', Object.keys(b))"

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/

  # Run tests (only needs one platform — tests don't touch TUN)
  test:
    runs-on: ubuntu-latest
    needs: addon
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nospoon-bare

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download linux-x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-linux-x64
          path: prebuilds/linux-x64/

      - name: Run tests
        run: node --test test/*.test.js

      - name: Verify CLI
        run: node bin/cli.js genkey

  # Build standalone single binary for each platform using bare-make
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            target: linux-x64
          - os: ubuntu-24.04
            platform: linux
            arch: arm64
            target: linux-arm64
          - os: macos-14
            platform: darwin
            arch: arm64
            target: darwin-arm64
          - os: macos-14
            platform: darwin
            arch: x64
            target: darwin-x64
          - os: windows-2022
            platform: win32
            arch: x64
            target: win32-x64

    runs-on: ${{ matrix.os }}
    name: binary (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4
        with:
          ref: nospoon-bare

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 nasm
          sudo ln -sf /usr/bin/clang-20 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-20 /usr/bin/clang++
          sudo ln -sf /usr/bin/lld-20 /usr/bin/lld
          sudo ln -sf /usr/bin/ld.lld-20 /usr/bin/ld.lld

      - name: Install cross-compile deps (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install LLVM + NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm nasm -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: npm install

      - name: Install bare-make
        run: npm install -g bare-make

      - name: Generate build
        shell: bash
        run: |
          ARGS=""
          if [ "${{ matrix.platform }}" != "$(node -e "console.log(process.platform)")" ] || \
             [ "${{ matrix.arch }}" != "$(node -e "console.log(process.arch)")" ]; then
            ARGS="--platform ${{ matrix.platform }} --arch ${{ matrix.arch }}"
          fi
          bare-make generate $ARGS

      - name: Build
        run: bare-make build

      - name: Install (strip symbols)
        shell: bash
        run: bare-make install --strip --prefix dist/${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.target }}/

  # Collect all prebuilds and binaries
  artifacts:
    runs-on: ubuntu-latest
    needs: [addon, test, binary]
    if: always() && needs.test.result == 'success'
    steps:
      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: false

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: false
        continue-on-error: true

      - name: Reorganize prebuilds
        run: |
          mkdir -p all-prebuilds
          for dir in prebuilds/prebuilds-*/; do
            target=$(basename "$dir" | sed 's/prebuilds-//')
            mkdir -p all-prebuilds/$target
            cp "$dir"/* all-prebuilds/$target/
          done
          echo "=== Prebuilds ==="
          find all-prebuilds -type f | sort

      - name: Reorganize binaries
        run: |
          mkdir -p all-binaries
          for dir in binaries/binary-*/; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir" | sed 's/binary-//')
            mkdir -p all-binaries/$target
            cp -r "$dir"/* all-binaries/$target/
          done
          echo "=== Binaries ==="
          find all-binaries -type f | sort
        continue-on-error: true

      - name: Upload combined prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-all
          path: all-prebuilds/

      - name: Upload combined binaries
        if: hashFiles('all-binaries/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: binaries-all
          path: all-binaries/
