name: Build

on:
  push:
    branches: [nospoon-swarm]
  pull_request:
    branches: [nospoon-swarm]

jobs:
  # Build native addon (.node + .bare) on each platform
  addon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-14
            target: darwin-x64
            arch: x86_64
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    runs-on: ${{ matrix.os }}
    name: addon (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        working-directory: native
        shell: bash
        run: |
          CMAKE_ARGS="-DCMAKE_PREFIX_PATH=$(cd ../node_modules && pwd)"
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_ARCHITECTURES=x86_64"
          fi
          cmake -B build $CMAKE_ARGS
          cmake --build build --config Release

      - name: Collect prebuilds
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.target }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp native/build/Release/nospoon-tun.node prebuilds/${{ matrix.target }}/ || \
            cp native/build/nospoon-tun.node prebuilds/${{ matrix.target }}/
          else
            cp native/build/nospoon-tun.node prebuilds/${{ matrix.target }}/
          fi
          # .bare file has versioned name from cmake-bare
          find native/build -name "*.bare" -exec cp {} prebuilds/${{ matrix.target }}/nospoon-tun.bare \;

      - name: Verify addon loads
        if: matrix.arch == ''
        run: node -e "const b = require('./lib/binding'); console.log('OK:', Object.keys(b))"

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/

  # Run tests (only needs one platform — tests don't touch TUN)
  test:
    runs-on: ubuntu-latest
    needs: addon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download linux-x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-linux-x64
          path: prebuilds/linux-x64/

      - name: Run tests
        run: node --test test/*.test.js

      - name: Verify CLI
        run: node bin/cli.js genkey

  # Build standalone single binary for each platform using bare-make
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            target: linux-x64
          - os: ubuntu-24.04
            platform: linux
            arch: arm64
            target: linux-arm64
          - os: macos-14
            platform: darwin
            arch: arm64
            target: darwin-arm64
          - os: macos-14
            platform: darwin
            arch: x64
            target: darwin-x64
          - os: windows-2022
            platform: win32
            arch: x64
            target: win32-x64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            target: android-arm64
            flags: -D ANDROID_STL=c++_static

    runs-on: ${{ matrix.os }}
    name: binary (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 nasm
          sudo ln -sf /usr/bin/clang-20 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-20 /usr/bin/clang++
          sudo ln -sf /usr/bin/lld-20 /usr/bin/lld
          sudo ln -sf /usr/bin/ld.lld-20 /usr/bin/ld.lld

      - name: Install cross-compile deps (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco upgrade llvm -y

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install nasm -y
          echo "/c/Program Files/NASM" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install

      - name: Install bare-make
        run: npm install -g bare-make

      - name: Generate build
        shell: bash
        run: |
          ARGS=""
          if [ "${{ matrix.platform }}" != "$(node -e "console.log(process.platform)")" ] || \
             [ "${{ matrix.arch }}" != "$(node -e "console.log(process.arch)")" ]; then
            ARGS="--platform ${{ matrix.platform }} --arch ${{ matrix.arch }}"
          fi
          bare-make generate $ARGS ${{ matrix.flags }}

      - name: Build
        run: bare-make build

      - name: Install (strip symbols)
        shell: bash
        run: bare-make install --strip --prefix dist/${{ matrix.target }}

      - name: Bundle wintun.dll (Windows)
        if: matrix.target == 'win32-x64'
        shell: bash
        run: cp bin/win32-x64/wintun.dll dist/${{ matrix.target }}/bin/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.target }}/

  # Smoke test: verify npm package works on each platform (Node.js)
  smoke-node:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    runs-on: ${{ matrix.os }}
    needs: addon
    name: smoke-node (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/

      - name: Verify addon loads
        run: node -e "const b = require('./lib/binding'); console.log('Addon OK:', Object.keys(b))"

      - name: Run unit tests
        run: node --test test/*.test.js

      - name: Test genkey
        run: node bin/cli.js genkey

      - name: Test config validation (rejects old format)
        shell: bash
        run: |
          echo '{"mode":"server"}' > old-config.jsonc
          node -e "
            const { loadConfig } = require('./lib/config');
            try { loadConfig('./old-config.jsonc'); process.exit(1); }
            catch (e) { console.log('Migration error OK:', e.message); }
          "

      - name: Test config validation (rejects missing seed)
        shell: bash
        run: |
          echo '{"topic":"test"}' > no-seed.jsonc
          node -e "
            const { loadConfig } = require('./lib/config');
            try { loadConfig('./no-seed.jsonc'); process.exit(1); }
            catch (e) { console.log('Seed required OK:', e.message); }
          "

  # Smoke test: verify standalone binary works on each platform
  smoke-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    runs-on: ${{ matrix.os }}
    needs: binary
    name: smoke-binary (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/

      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x dist/bin/nospoon

      - name: Test --help
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/bin/nospoon.exe --help
          else
            dist/bin/nospoon --help
          fi

      - name: Test genkey
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/bin/nospoon.exe genkey
          else
            dist/bin/nospoon genkey
          fi

      - name: Test config validation (rejects old format)
        shell: bash
        run: |
          echo '{"mode":"server"}' > bad.jsonc
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/bin/nospoon.exe up bad.jsonc 2>&1 && exit 1 || echo "Config validation works"
          else
            dist/bin/nospoon up bad.jsonc 2>&1 && exit 1 || echo "Config validation works"
          fi

  # Collect all prebuilds and binaries, create release
  artifacts:
    runs-on: ubuntu-latest
    needs: [addon, test, binary, smoke-node, smoke-binary]
    if: always() && needs.test.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: false

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: false
        continue-on-error: true

      - name: Reorganize prebuilds
        run: |
          mkdir -p all-prebuilds
          for dir in prebuilds/prebuilds-*/; do
            target=$(basename "$dir" | sed 's/prebuilds-//')
            mkdir -p all-prebuilds/$target
            cp "$dir"/* all-prebuilds/$target/
          done
          echo "=== Prebuilds ==="
          find all-prebuilds -type f | sort

      - name: Reorganize binaries
        run: |
          mkdir -p all-binaries
          for dir in binaries/binary-*/; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir" | sed 's/binary-//')
            mkdir -p all-binaries/$target
            cp -r "$dir"/* all-binaries/$target/
          done
          echo "=== Binaries ==="
          find all-binaries -type f | sort
        continue-on-error: true

      - name: Upload combined prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-all
          path: all-prebuilds/

      - name: Upload combined binaries
        if: hashFiles('all-binaries/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: binaries-all
          path: all-binaries/

      - name: Create platform tarballs
        run: |
          mkdir -p release-assets
          for dir in all-prebuilds/*/; do
            target=$(basename "$dir")
            tar czf release-assets/nospoon-prebuilds-$target.tar.gz -C "$dir" .
          done
          for dir in all-binaries/*/; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir")
            tar czf release-assets/nospoon-$target.tar.gz -C "$dir" .
          done
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create test release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.6.0-swarm-test --yes --cleanup-tag --repo ${{ github.repository }} 2>/dev/null || true
          gh release create v0.6.0-swarm-test \
            --repo ${{ github.repository }} \
            --target nospoon-swarm \
            --title "v0.6.0-swarm-test — Swarm mesh VPN (test release)" \
            --notes "$(cat <<'EOF'
          Test release from the nospoon-swarm branch. **Not for production.**

          ## What's new
          Full mesh VPN — all peers are equal, discover each other via topic,
          connect directly (pairwise). Any peer can be an exit node.

          ## Config format
          ```jsonc
          {
            "topic": "my-group",
            "seed": "<your-64hex-seed>",
            "peers": {
              "<pubkey-A>": "10.0.0.1",
              "<pubkey-B>": "10.0.0.2"
            }
          }
          ```

          ## Standalone binaries
          | File | Platform |
          |------|----------|
          | nospoon-linux-x64.tar.gz | Linux x86_64 |
          | nospoon-linux-arm64.tar.gz | Linux ARM64 (Raspberry Pi) |
          | nospoon-darwin-arm64.tar.gz | macOS Apple Silicon |
          | nospoon-darwin-x64.tar.gz | macOS Intel |
          | nospoon-win32-x64.tar.gz | Windows x64 |
          | nospoon-android-arm64.tar.gz | Android ARM64 |

          ## Usage
          ```bash
          # Generate identity
          nospoon genkey
          # Share public key, add all peers to config, then:
          sudo nospoon up config.jsonc
          ```
          EOF
          )" \
            --prerelease \
            release-assets/*
